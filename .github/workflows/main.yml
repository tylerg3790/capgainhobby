name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
      - name: Clear npm cache      # Move this AFTER setup-node
      run: npm cache clean --force
      - name: Install dependencies
      run: npm ci --no-audit --prefer-offline --no-progress
      - run: npm run lint
      - run: npm run build

